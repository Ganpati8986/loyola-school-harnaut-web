<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Loyola School Harnaut | Best CBSE School in Harnaut, Bihar</title>
    <meta name="description" content="Loyola School Harnaut is a top CBSE school in Harnaut, Bihar offering quality education, modern facilities, experienced teachers, and holistic student development." />
    <meta name="keywords" content="Loyola School Harnaut, Best school in Harnaut, CBSE school Bihar, top school Nalanda, English medium school Harnaut,Best school in Bihar ,Best School in india" />
    <meta name="author" content="Loyola School Harnaut" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.loyolaschoolharnaut.in/" />

    <!-- Open Graph (Facebook / WhatsApp) -->
    <meta property="og:title" content="Loyola School Harnaut - Best School in Bihar" />
    <meta property="og:description" content="Providing quality education with modern facilities and experienced teachers." />
    <meta property="og:image" content="https://www.loyolaschoolharnaut.in/logo.png" />
    <meta property="og:url" content="https://www.loyolaschoolharnaut.in/" />
    <meta property="og:type" content="website" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Loyola School Harnaut" />
    <meta name="twitter:description" content="Top CBSE school in Harnaut with modern education system." />
    <meta name="twitter:image" content="https://www.loyolaschoolharnaut.in/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preload for performance -->
    <link rel="preload" href="/src/main.tsx" as="script" />

    <!-- Structured Data (Very Important for Ranking) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "School",
        "name": "Loyola School Harnaut",
        "url": "https://www.loyolaschoolharnaut.com",
        "logo": "https://www.loyolaschoolharnaut.com/logo.png",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Harnaut",
          "addressRegion": "Bihar",
          "addressCountry": "India"
        },
        "sameAs": [
          "https://www.facebook.com/",
          "https://www.instagram.com/"
        ]
      }
    </script>
  </head>

  <body>
    <!-- SEO fallback content (important for React apps) -->
    <noscript>
      Loyola School Harnaut is one of the best schools in Bihar providing quality education.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
